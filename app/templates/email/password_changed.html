<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f5f4f0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f4f0;padding:40px 20px">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)">
        <tr><td style="background:#c8502a;padding:28px 40px;text-align:center">
          <h1 style="margin:0;color:white;font-size:1.6rem;font-family:Georgia,serif">✦ BlogSphere</h1>
        </td></tr>
        <tr><td style="padding:40px">
          <div style="text-align:center;margin-bottom:24px">
            <div style="width:64px;height:64px;border-radius:50%;background:#fdecea;display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem">🔐</div>
          </div>
          <h2 style="margin:0 0 12px;font-size:1.3rem;color:#1a1814;text-align:center">Password Changed</h2>
          <p style="color:#6b6560;font-size:0.95rem;line-height:1.7;margin:0 0 20px;text-align:center">
            Hi <strong>{{ user.username }}</strong>, your BlogSphere password was successfully changed.
          </p>
          <div style="background:#fdecea;border-radius:8px;padding:16px 20px;margin:0 0 24px">
            <p style="margin:0;color:#c0392b;font-size:0.875rem">
              ⚠️ If you did not make this change, please contact support immediately and secure your account.
            </p>
          </div>
        </td></tr>
        <tr><td style="background:#f5f4f0;padding:20px 40px;text-align:center">
          <p style="margin:0;color:#9b958d;font-size:0.78rem">© 2026 BlogSphere</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
